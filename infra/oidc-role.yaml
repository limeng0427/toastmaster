AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub Actions OIDC provider and deploy role for Toastmaster

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub organisation or user name (e.g. liamli)
  GitHubRepo:
    Type: String
    Default: toastmaster
    Description: GitHub repository name

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ToastmasterDeployRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOidcProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main
      Policies:
        - PolicyName: ToastmasterDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudFormation
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:ValidateTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                Resource:
                  - !Sub arn:aws:cloudformation:us-east-1:${AWS::AccountId}:stack/toastmaster-prod/*
                  - !Sub arn:aws:cloudformation:us-east-1:${AWS::AccountId}:stack/toastmaster-oidc/*
              # S3 — bucket management (CFN creates it) + file sync
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutBucketVersioning
                  - s3:GetBucketPolicy
                  - s3:GetBucketLocation
                  - s3:GetBucketPublicAccessBlock
                  - s3:PutBucketTagging
                Resource: !Sub arn:aws:s3:::toastmaster-*
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::toastmaster-*
                  - !Sub arn:aws:s3:::toastmaster-*/*
              # ACM
              - Effect: Allow
                Action:
                  - acm:RequestCertificate
                  - acm:DescribeCertificate
                  - acm:DeleteCertificate
                  - acm:ListCertificates
                  - acm:AddTagsToCertificate
                Resource: '*'
              # CloudFront
              - Effect: Allow
                Action:
                  - cloudfront:CreateDistribution
                  - cloudfront:UpdateDistribution
                  - cloudfront:DeleteDistribution
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:TagResource
                  - cloudfront:CreateOriginAccessControl
                  - cloudfront:UpdateOriginAccessControl
                  - cloudfront:DeleteOriginAccessControl
                  - cloudfront:GetOriginAccessControl
                  - cloudfront:CreateInvalidation
                  - cloudfront:ListDistributions
                Resource: '*'
              # Route53
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                  - route53:GetChange
                Resource: '*'
              # IAM PassRole (for any IAM roles CFN might create)
              - Effect: Allow
                Action: iam:PassRole
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/Toastmaster*

Outputs:
  DeployRoleArn:
    Value: !GetAtt DeployRole.Arn
    Description: Add this as GitHub secret AWS_ROLE_ARN
