name: E2E Tests (AI)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'  # every Monday at 9am UTC

jobs:
  e2e-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run AI use case tests
        run: npm run test:ai-e2e
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload AI test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-ai-report-${{ github.run_id }}
          path: playwright-ai-report/
          retention-days: 14

      - name: Publish report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright-ai-report/
          destination_dir: ${{ github.run_number }}
          keep_files: true

      - name: Print report URL
        if: always()
        run: |
          URL="https://limeng0427.github.io/toastmaster/${{ github.run_number }}/"
          echo "Report URL: $URL"
          echo "## AI E2E Test Report" >> $GITHUB_STEP_SUMMARY
          echo "[View Playwright Report]($URL)" >> $GITHUB_STEP_SUMMARY
